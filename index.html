<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimnasio Pokémon de Darwin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="Imagenes/Pke.PNG" type="image/png">
</head>

<body>
    <div class="container">
        <header>
            <h1>Jeanasio de Darwin y Otaku</h1>

            <div class="header-center">
                <img src="Imagenes/Icono.png" alt="Escudo" class="Logo-escudo">
            </div>

            <div class="header-right">
                <button class="btn btn-delete-all" onclick="borrarTodo()">Borrar Todo</button>
            </div>
        </header>

        <main>
            <section aria-labelledby="form-title">
                <h2 id="form-title">Registrar Entrenador</h2>
                <!-- Nombre -->
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej: Ash Ketchum">
                </div>

                <!-- Ciudad -->
                <div class="form-group">
                    <label for="ciudad">Región o Ciudad</label>
                    <select id="ciudad" class="select-moderno">
                        <option value="" disabled selected>Selecciona una ciudad...</option>
                        <option value="Pueblo Paleta">Pueblo Paleta</option>
                        <option value="Ciudad Verde">Ciudad Verde</option>
                        <option value="Ciudad Plateada">Ciudad Plateada</option>
                        <option value="Ciudad Celeste">Ciudad Celeste</option>
                    </select>
                </div>

                <!-- Medalla -->
                <div class="form-group">
                    <label>¿Posee Medalla de Gimnasio?</label>
                    <div style="display: flex; gap: 20px; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="radio" name="medalla_opt" value="true" checked>
                            <span>Sí, soy campeón</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="radio" name="medalla_opt" value="false">
                            <span>No poseo medalla todavía</span>
                        </label>
                    </div>
                </div>

                <button class="btn btn-save" onclick="guardarEntrenador()">Guardar Entrenador</button>
            </section>

            <!-- Lista de Entrenadores -->
            <section aria-labelledby="list-title">
                <h2 id="list-title">Entrenadores en la Base de Datos</h2>
                <div id="lista-entrenadores">
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 - Darwin - Panel de Control Pokémon</p>
        </footer>
    </div>
    <script src="usual.js"></script>
</body>

</html>
