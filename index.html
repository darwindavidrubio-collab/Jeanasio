<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimnasio Pokémon de Darwin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="Imagenes/Pke.PNG">
</head>

<body>
    <canvas id="batCanvas" role="presentation"></canvas>
    <audio id="musicaFondo" loop aria-hidden="true">
        <source src="Musica/Cynthia.mp3" type="audio/mpeg" preload="auto">
    </audio>

    <div class="container">
        <header>
            <h1>Jeanasio de Darwin y Otaku</h1>
            <figure class="header-center" style="margin: 0;">
                <img src="Imagenes/Icono3.png" alt="Escudo oficial del Jeanasio Pokémon" class="Logo-escudo">
            </figure>

            <div class="header-right" id="header-actions"
                style="display: none; text-align: right; align-items: center; gap: 15px; justify-content: flex-end;">
                <div
                    style="display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--border);">
                    <button id="btn-mute" class="btn" onclick="mutearMusica()" aria-label="Silenciar música"
                        style="color: #a1a1aa; border: none; padding: 0; background: transparent; font-size: 1.2rem; cursor: pointer;">🔊</button>
                    <input type="range" id="volumen-slider" min="0" max="1" step="0.05" value="0.5"
                        oninput="cambiarVolumen(this.value)" aria-label="Control de volumen"
                        style="width: 80px; cursor: pointer; accent-color: var(--accent);">
                </div>

                <button class="btn btn-delete-all" onclick="cerrarSesion()"
                    style="color: white; border-color: var(--border);">Cerrar Sesión</button>
            </div>
        </header>

        <main>
            <section id="login-section" aria-labelledby="login-title">
                <h2 id="login-title">Acceso Restringido (VIP)</h2>
                <form onsubmit="event.preventDefault(); iniciarSesion();">
                    <div class="form-group">
                        <label for="login-username">Usuario Administrador</label>
                        <input type="text" id="login-username" required placeholder="Ej: Ash Ketchum"
                            autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" required placeholder="Tu clave secreta"
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-save">Desbloquear Gimnasio</button>
                </form>
                <p id="login-error" role="alert" style="color: var(--danger); text-align: center; margin-top: 15px;">
                </p>
            </section>

            <div id="gym-section" style="display: none;">

                <section id="registro-entrenadores" aria-labelledby="registro-title">
                    <h2 id="registro-title">Registrar Entrenador</h2>
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ej: Ash Ketchum">
                    </div>

                    <div class="form-group">
                        <label for="ciudad">Región o Ciudad</label>
                        <select id="ciudad" class="select-moderno">
                            <option value="" disabled selected>Selecciona una ciudad...</option>
                            <option value="Pueblo Paleta">Pueblo Paleta</option>
                            <option value="Ciudad Verde">Ciudad Verde</option>
                            <option value="Ciudad Plateada">Ciudad Plateada</option>
                            <option value="Ciudad Celeste">Ciudad Celeste</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="pokemon" id="label-pokemon">Pokémon Inicial (Socio)</label>
                        <select id="pokemon" class="select-moderno" required aria-required="true"
                            aria-labelledby="label-pokemon">
                            <option value="" disabled selected>Elige a tu compañero...</option>

                            <optgroup label="Iniciales Clásicos">
                                <option value="bulbasaur">Bulbasaur 🍃</option>
                                <option value="charmander">Charmander 🔥</option>
                                <option value="squirtle">Squirtle 💧</option>
                            </optgroup>

                            <optgroup label="Especiales">
                                <option value="pikachu">Pikachu ⚡</option>
                                <option value="eevee">Eevee 🌟</option>
                            </optgroup>

                            <optgroup label="Exclusivos de la Cueva">
                                <option value="zubat">Zubat 🦇</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>¿Posee Medalla de Gimnasio?</label>
                        <div style="display: flex; gap: 20px; margin-top: 10px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="medalla_opt" value="true" checked>
                                <span>Sí, soy campeón</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="medalla_opt" value="false">
                                <span>No poseo medalla todavía</span>
                            </label>
                        </div>
                    </div>
                    <button type="button" class="btn btn-save" onclick="crearEntrenador()">Guardar Entrenador</button>
                </section>


                <section id="base-datos" aria-labelledby="db-title">
                    <header
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h2 id="db-title" style="margin: 0;">Base de Datos</h2>

                        <menu aria-label="Controles de la base de datos"
                            style="display: flex; align-items: center; gap: 15px; margin: 0; padding: 0; list-style: none;">
                            <li>
                                <button class="btn" id="btn-refresh" onclick="refrescarBaseDatos()"
                                    aria-controls="lista-entrenadores" aria-label="Actualizar lista de entrenadores"
                                    title="Buscar entrenadores nuevos"
                                    style="background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s;">
                                    🔄 Refrescar
                                </button>
                            </li>
                            <li>
                                <button class="btn btn-delete-all" onclick="eliminarTodos()"
                                    aria-controls="lista-entrenadores"
                                    aria-label="Borrar permanentemente todos los entrenadores">
                                    Borrar Todo
                                </button>
                            </li>
                        </menu>
                    </header>

                    <search style="display: block; margin-bottom: 20px;">
                        <div class="form-group" style="margin-bottom: 10px;">
                            <input type="search" id="buscador-entrenadores"
                                placeholder="🔍 Buscar entrenador por nombre..." class="select-moderno"
                                onkeyup="buscarEntrenador()" aria-label="Escribe el nombre del entrenador a buscar">
                        </div>

                        <div
                            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">

                            <select id="filtro-ciudad" class="select-moderno" onchange="buscarEntrenador()">
                                <option value="">🌍 Todas las Ciudades</option>
                                <option value="Pueblo Paleta">Pueblo Paleta</option>
                                <option value="Ciudad Verde">Ciudad Verde</option>
                                <option value="Ciudad Plateada">Ciudad Plateada</option>
                                <option value="Ciudad Celeste">Ciudad Celeste</option>
                            </select>

                            <select id="filtro-pokemon" class="select-moderno" onchange="buscarEntrenador()">
                                <option value="">🐾 Todos los Pokémon</option>
                                <option value="bulbasaur">Bulbasaur</option>
                                <option value="charmander">Charmander</option>
                                <option value="squirtle">Squirtle</option>
                                <option value="pikachu">Pikachu</option>
                                <option value="eevee">Eevee</option>
                                <option value="zubat">Zubat</option>
                            </select>

                            <select id="filtro-medalla" class="select-moderno" onchange="buscarEntrenador()">
                                <option value="">🏅 Todos los Rangos</option>
                                <option value="true">Solo Campeones</option>
                                <option value="false">Solo Novatos</option>
                            </select>

                        </div>
                    </search>

                    <div id="lista-entrenadores" role="region" aria-live="polite" aria-atomic="false"></div>

                    <nav aria-label="Paginación de entrenadores" style="margin-top: 20px;">
                        <ul
                            style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; list-style: none; margin: 0;">
                            <li>
                                <button class="btn" id="btn-prev" onclick="cambiarPagina(-1)"
                                    aria-label="Ir a la página anterior"
                                    style="padding: 5px 15px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main);">⬅️
                                    Anterior</button>
                            </li>
                            <li aria-live="polite">
                                <span id="indicador-pagina" aria-current="page"
                                    style="color: var(--accent); font-weight: bold;">Página 1</span>
                            </li>
                            <li>
                                <button class="btn" id="btn-next" onclick="cambiarPagina(1)"
                                    aria-label="Ir a la página siguiente"
                                    style="padding: 5px 15px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main);">Siguiente
                                    ➡️</button>
                            </li>
                        </ul>
                    </nav>
                </section>


                <aside id="admin-panel"
                    style="display: none; border-color: #fbbf24; box-shadow: 0 4px 20px rgba(251, 191, 36, 0.1);"
                    aria-labelledby="admin-title">
                    <h2 id="admin-title" style="color: #fbbf24;">👑 Bóveda Secreta (Panel de Dios)</h2>
                    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">Control total de
                        usuarios registrados en el sistema. (Vista exclusiva de Darwin)</p>
                    <div id="lista-usuarios"></div>
                </aside>

            </div>
        </main>

        <footer>
            <small>&copy; 2026 - Darwin - Panel de Control Pokémon Full-Stack</small>
        </footer>
    </div>

    <script src="usual.js"></script>
    <script src="motor_canvas.js"></script>
</body>

</html>
